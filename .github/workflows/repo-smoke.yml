name: Repo Smoke

on:
  push:
  pull_request:

jobs:
  data-free-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Public repository safety check
        run: python scripts/check_repo_public_safety.py

      - name: Public safety unit test
        run: python -m unittest tests.test_repo_public_safety -q

      - name: Memo factory quality gate config check
        run: python scripts/verify_memo_factory_quality_gates.py --config config/memo_factory_quality_gates.yml

      - name: Test strategy policy check
        run: python scripts/check_test_strategy.py

      - name: Test strategy unit test
        run: python -m unittest tests.test_test_strategy -q
